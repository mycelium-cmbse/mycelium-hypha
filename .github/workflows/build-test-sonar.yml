name: Build & Test & SonarQube

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test & SonarQube
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up JDK 17
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17'
          overwrite-settings: false

      - name: Setup dotnet
        uses: actions/setup-dotnet@v5.1.0
        with:
          dotnet-version: '10.0.x'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install spec-extract dependencies (Python)
        # Wheels only (no source builds / setup scripts) and pinned to the committed lock.
        run: |
          pip install --only-binary :all: --no-deps -r tools/spec-extract/requirements-dev.lock

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'NuGet.config') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore mycelium-hypha.sln

      - name: SonarQube begin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_SCANNER_OPTS: "-Xmx4096m"
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet tool install --global dotnet-coverage
          dotnet sonarscanner begin /k:"mycelium-cmbse_mycelium-hypha" /o:"mycelium-cmbse" /d:sonar.token="$SONAR_TOKEN" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml /d:sonar.python.coverage.reportPaths="tools/spec-extract/coverage.xml" /d:sonar.python.version="3.12" /d:sonar.tests="tools/spec-extract/tests"

      - name: Build
        run: dotnet build mycelium-hypha.sln --no-restore --no-incremental /p:ContinuousIntegrationBuild=true

      - name: Run tests and compute coverage
        run: dotnet-coverage collect "dotnet test mycelium-hypha.sln --no-restore --no-build --verbosity normal" -f xml -o "coverage.xml"

      - name: Lint Python (ruff)
        run: ruff check tools/spec-extract

      - name: Test Python and compute coverage
        working-directory: tools/spec-extract
        # Import from the src layout without an editable (source-build) install.
        env:
          PYTHONPATH: src
        run: pytest --cov=spec_extract --cov-report=xml

      - name: SonarQube end
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
